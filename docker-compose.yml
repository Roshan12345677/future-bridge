version: '3.9'

services:
  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: fb_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - fb_network

  # Backend API
  backend:
    build: ./backend
    container_name: fb_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/future-bridge
      - JWT_SECRET=change_this_in_production_super_secret_key
      - JWT_EXPIRE=7d
      - CLIENT_URL=http://localhost:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JUDGE0_API_KEY=${JUDGE0_API_KEY:-}
      - JUDGE0_API_HOST=judge0-ce.p.rapidapi.com
    depends_on:
      - mongo
    networks:
      - fb_network

  # Frontend
  frontend:
    build: ./frontend
    container_name: fb_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - fb_network

networks:
  fb_network:
    driver: bridge

volumes:
  mongo_data:
